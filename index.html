<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aquaman Services — Premium Mobile Detailing</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0B1A2E;
    --ink-2: #0F2540;
    --ink-3: #15315A;
    --blue: #1E5BC6;
    --blue-bright: #2F7BFF;
    --blue-soft: #5C8CE0;
    --line: #DDE3EC;
    --paper: #EEF1F4;
    --paper-2: #F6F8FA;
    --white: #FFFFFF;
    --text: #0B1A2E;
    --muted: #5B6B82;
    --shadow-sm: 0 1px 2px rgba(11,26,46,.06), 0 2px 8px rgba(11,26,46,.04);
    --shadow-md: 0 10px 30px rgba(11,26,46,.08), 0 2px 6px rgba(11,26,46,.05);
    --shadow-lg: 0 30px 60px rgba(11,26,46,.18), 0 8px 20px rgba(11,26,46,.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    color: var(--text);
    background: var(--paper-2);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  h1, h2, h3, h4, .display, .eyebrow {
    font-family: 'Plus Jakarta Sans', sans-serif;
    letter-spacing: -0.02em;
  }
  .display { font-weight: 800; line-height: 0.98; letter-spacing: -0.035em; }
  .eyebrow {
    font-weight: 700; font-size: 12px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--blue);
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  img { display: block; max-width: 100%; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 28px; }
  @media (max-width: 720px) { .container { padding: 0 18px; } }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 24px; font-weight: 600; font-size: 14px;
    letter-spacing: -0.005em;
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: transform .15s ease, box-shadow .2s ease, background .2s ease, opacity .2s ease;
    border-radius: 999px;
  }
  .btn-primary { background: #000; color: var(--white); padding-left: 28px; padding-right: 28px; }
  .btn-primary:hover { background: #1a1a1a; transform: translateY(-1px); }
  .btn-ghost { background: rgba(255,255,255,.1); color: var(--white); border: 1px solid rgba(255,255,255,.22); padding-left: 28px; padding-right: 28px; backdrop-filter: blur(10px); }
  .btn-ghost:hover { background: rgba(255,255,255,.18); }
  .btn-dark { background: var(--ink); color: var(--white); padding-left: 28px; padding-right: 28px; }
  .btn-dark:hover { background: var(--ink-3); }

  /* Hex background pattern (inline as encoded SVG) */
  .hex-bg {
    background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='56' height='49' viewBox='0 0 56 49'%3E%3Cpath fill='none' stroke='%231E5BC6' stroke-opacity='.18' stroke-width='1' d='M14 0 L42 0 L56 24.5 L42 49 L14 49 L0 24.5 Z'/%3E%3C/svg%3E");
    background-size: 56px 49px;
  }
  .hex-bg-dark {
    background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='56' height='49' viewBox='0 0 56 49'%3E%3Cpath fill='none' stroke='%232F7BFF' stroke-opacity='.10' stroke-width='1' d='M14 0 L42 0 L56 24.5 L42 49 L14 49 L0 24.5 Z'/%3E%3C/svg%3E");
    background-size: 56px 49px;
  }

  /* Diagonal section divider */
  .skew-top { clip-path: polygon(0 36px, 100% 0, 100% 100%, 0 100%); }
  .skew-bottom { clip-path: polygon(0 0, 100% 0, 100% calc(100% - 36px), 0 100%); }

  /* Animations */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  .fadeup { animation: fadeUp .8s ease both; }
  @keyframes drift { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  /* Service icon hexagon */
  .hex {
    width: 64px; height: 56px;
    background: var(--white);
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    display: grid; place-items: center;
    position: relative;
  }
  .hex::before {
    content: ''; position: absolute; inset: 2px;
    background: var(--white);
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    z-index: 0;
  }
  .hex > * { position: relative; z-index: 1; }
  .hex-outline {
    background: var(--blue);
  }
  .hex-outline::before {
    background: var(--paper-2);
  }

  /* Floating call (mobile) */
  .fab-call {
    position: fixed; right: 20px; bottom: 20px; z-index: 80;
    background: var(--blue); color: white;
    width: 60px; height: 60px; border-radius: 50%;
    display: grid; place-items: center;
    box-shadow: 0 10px 30px rgba(30,91,198,.45);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(30,91,198,.5); }
    70% { box-shadow: 0 0 0 18px rgba(30,91,198,0); }
    100% { box-shadow: 0 0 0 0 rgba(30,91,198,0); }
  }

  /* Image placeholder (slot) */
  .slot {
    background:
      repeating-linear-gradient(135deg, rgba(11,26,46,.06) 0 12px, rgba(11,26,46,.03) 12px 24px),
      var(--paper);
    border: 1px dashed rgba(11,26,46,.18);
    display: grid; place-items: center;
    color: var(--muted); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    text-align: center; padding: 24px;
  }
  .slot-dark {
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,.06) 0 12px, rgba(255,255,255,.03) 12px 24px),
      rgba(255,255,255,.04);
    border-color: rgba(255,255,255,.2);
    color: rgba(255,255,255,.55);
  }

  /* Form */
  .field {
    display: flex; flex-direction: column; gap: 6px;
  }
  .field label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--muted);
  }
  .field input, .field select, .field textarea {
    font-family: inherit; font-size: 15px; color: var(--text);
    padding: 14px 16px; border: 1px solid var(--line);
    background: var(--white); border-radius: 4px;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--blue);
    box-shadow: 0 0 0 4px rgba(30,91,198,.12);
  }

  /* Booking modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(11,26,46,.72);
    backdrop-filter: blur(6px); z-index: 100;
    display: grid; place-items: center; padding: 20px;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--white); width: 100%; max-width: 640px;
    border-radius: 8px; box-shadow: var(--shadow-lg);
    overflow: hidden; animation: modalIn .3s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes modalIn { from { transform: translateY(20px) scale(.98); opacity: 0; } to { transform: none; opacity: 1; } }

  /* Marquee */
  .marquee { overflow: hidden; }
  .marquee-track { display: flex; gap: 60px; animation: scroll 30s linear infinite; white-space: nowrap; }
  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ──────────────────────────────────────────────
     MOBILE OPTIMIZATIONS · ≤ 900px tablet, ≤ 640px phone, ≤ 380px small phone
     Targets the responsive issues that the inline media-queries didn't cover.
     ────────────────────────────────────────────── */

  /* Prevent horizontal scroll on any device */
  html, body { overflow-x: hidden; max-width: 100vw; }

  /* ===== TABLET & MOBILE  (≤ 900px) ===== */
  @media (max-width: 900px) {
    .container { padding: 0 20px !important; }

    /* Tighten section padding (was 120px 0) */
    section { padding-top: 72px !important; padding-bottom: 72px !important; }

    /* Display headlines: cap clamp's lower end */
    .display { letter-spacing: -0.025em !important; }
  }

  /* ===== PHONE  (≤ 640px) ===== */
  @media (max-width: 640px) {
    .container { padding: 0 16px !important; }

    /* ── NAV ── shrink chunky header, drop speech bubble badge */
    header > .container {
      padding: 10px 16px !important;
      gap: 12px !important;
    }
    header a[href="#top"] > div:first-child {  /* logo circle */
      width: 42px !important; height: 42px !important;
    }
    header a[href="#top"] > div:first-child img {
      width: 26px !important; height: 26px !important;
    }
    header a[href="#top"] > span {              /* AQUAMAN wordmark */
      font-size: 20px !important;
    }
    /* Hide the big speech bubble + "Call us" stack; show just a phone pill */
    .nav-right > a[href^="tel"] > div:first-child { display: none !important; }
    .nav-right > a[href^="tel"] {
      gap: 0 !important;
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #2F7BFF;
      display: grid !important;
      place-items: center !important;
      box-shadow: 0 4px 14px rgba(47,123,255,.45);
    }
    .nav-right > a[href^="tel"]::before {
      content: '';
      width: 20px; height: 20px;
      background-color: white;
      mask: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='black' d='M5 4 L9 4 L11 9 L8.5 10.5 C9.5 13 11 14.5 13.5 15.5 L15 13 L20 15 V19 C20 19.5 19.5 20 19 20 C11 20 4 13 4 5 C4 4.5 4.5 4 5 4 Z'/%3E%3C/svg%3E") center / contain no-repeat;
      -webkit-mask: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='black' d='M5 4 L9 4 L11 9 L8.5 10.5 C9.5 13 11 14.5 13.5 15.5 L15 13 L20 15 V19 C20 19.5 19.5 20 19 20 C11 20 4 13 4 5 C4 4.5 4.5 4 5 4 Z'/%3E%3C/svg%3E") center / contain no-repeat;
    }
    .nav-right { gap: 0 !important; align-items: center !important; flex-direction: row !important; }
    .nav-socials { display: none !important; }  /* keep header lean; socials live in footer */

    /* ── HERO ── breathing room around big text */
    section#top { padding-top: 110px !important; padding-bottom: 100px !important; min-height: 90vh !important; }
    section#top h1.display { font-size: clamp(34px, 9.5vw, 48px) !important; margin-bottom: 28px !important; }
    section#top h1.display br { display: none; }       /* let it wrap naturally */
    section#top [class="fadeup"] > div:first-child {   /* eyebrow */
      font-size: 13px !important; margin-bottom: 18px !important;
    }
    section#top div[style*="height: 60px"] { height: 40px !important; margin-bottom: 28px !important; }
    section#top .btn { width: 100%; max-width: 320px; justify-content: center; font-size: 14px !important; padding: 16px 24px !important; }
    section#top div[style*="gap: 16px"][style*="justifyContent: center"] { flex-direction: column; align-items: center; }

    /* Hide the "Scroll" indicator so it doesn't fight with the FAB call button */
    section#top > div[style*="bottom: 30px"] { display: none !important; }

    /* ── BRANDS MARQUEE ── already handled inline, just tighten */
    .brand-track { gap: 40px !important; }

    /* ── SERVICES ── kill sticky right column, smaller heading */
    .services-layout { gap: 48px !important; }
    .services-layout > div > div[style*="position: sticky"],
    .services-layout div[style*="sticky"] { position: static !important; }
    .services-layout h2.display { font-size: clamp(32px, 8vw, 42px) !important; }
    .service-row { padding: 18px 0 !important; }
    .service-row span[style*="JetBrains Mono"] { min-width: 22px !important; font-size: 10px !important; }
    .service-row .service-arrow { width: 32px !important; height: 32px !important; }

    /* ── PROCESS ── number stroke smaller, single column */
    .process-grid { gap: 48px !important; }
    .process-grid > div:first-child > div[style*="sticky"] { position: static !important; }
    .process-grid h3 { font-size: 18px !important; }
    /* The huge stroked numbers */
    .process-grid > div:nth-child(2) > div > div > div[style*="font-size: 64px"],
    .process-grid > div:nth-child(2) div[style*="WebkitTextStroke"] {
      font-size: 40px !important;
    }

    /* ── ENHANCEMENTS ── header stacks, larger touch targets */
    .enh-header { gap: 28px !important; }

    /* ── REEL ── 2 columns sweet spot on phone, then 1 on small */
    .reel-grid { gap: 12px !important; }

    /* ── STATS ── compact spacing */
    .stats-grid { gap: 28px !important; }
    .stats-grid .display { font-size: 44px !important; }

    /* ── REVIEWS ── */
    .reviews-grid > div > div { padding: 24px !important; }
    .reviews-grid p { font-size: 16px !important; }

    /* ── CONTACT ── 1 col, smaller contact pills */
    .contact-grid { gap: 48px !important; }
    .contact-grid a[style*="padding: 22px 28px"] {
      padding: 16px 18px !important; gap: 14px !important;
    }
    .contact-grid a[style*="padding: 22px 28px"] > div:first-child {
      width: 44px !important; height: 44px !important;
    }
    .contact-grid .display { font-size: 22px !important; }
    .contact-grid a[href^="tel"] .display { font-size: 24px !important; }
    /* Schedule/area row → stack as 2 col */
    .contact-grid > div:first-child > div:last-child { gap: 18px !important; }

    /* Contact form card */
    .contact-grid > div:last-child > div { padding: 24px !important; }
    .contact-grid h3.display { font-size: 24px !important; }

    /* ── OUTRO ── shrink huge gap between logo and word */
    section[style*="minHeight: '72vh'"] { min-height: 60vh !important; padding: 80px 0 !important; }
    /* The flex container with massive gap */
    section[style*="minHeight: '72vh'"] div[style*="gap: \"clamp(160px"],
    section[style*="minHeight: '72vh'"] div[style*="clamp(160px"] {
      gap: 20px !important;
      flex-direction: column !important;
    }
    section[style*="minHeight: '72vh'"] h2.display {
      font-size: clamp(48px, 16vw, 88px) !important;
    }

    /* ── FOOTER ── single column on small phones */
    .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 28px !important; }
    .footer-grid > div:first-child { grid-column: 1 / -1; }
    .footer-bottom { flex-direction: column !important; gap: 14px !important; text-align: center !important; }

    /* ── FAB CALL ── slightly smaller, lift it above iOS Safari bottom bar */
    .fab-call {
      width: 54px !important; height: 54px !important;
      right: 16px !important;
      bottom: max(16px, env(safe-area-inset-bottom, 16px)) !important;
    }

    /* ── BUTTONS ── full width by default on phone is too aggressive,
       only force-wrap groups that explicitly contain multiple .btn */
    .btn { padding: 14px 22px !important; font-size: 13.5px !important; }

    /* ── BOOKING MODAL ── full-bleed on phone */
    .modal { border-radius: 0 !important; max-height: 100vh; height: 100vh; }
    .modal-overlay { padding: 0 !important; align-items: stretch !important; }
  }

  /* ===== SMALL PHONE  (≤ 380px) ===== */
  @media (max-width: 380px) {
    .container { padding: 0 14px !important; }
    section { padding-top: 56px !important; padding-bottom: 56px !important; }

    header > .container { padding: 8px 14px !important; }
    header a[href="#top"] > span { font-size: 18px !important; }

    section#top h1.display { font-size: 30px !important; }
    section#top .btn { font-size: 13px !important; padding: 14px 20px !important; }

    .footer-grid { grid-template-columns: 1fr !important; }

    /* Outro wordmark */
    section[style*="minHeight: '72vh'"] h2.display { font-size: 44px !important; }

    /* Contact form */
    .contact-grid > div:last-child > div { padding: 20px !important; }
    .contact-grid h3.display { font-size: 22px !important; }
    .field input, .field select, .field textarea { font-size: 16px !important; }  /* 16px avoids iOS zoom-on-focus */
  }

  /* Always 16px+ inputs on phone to prevent iOS zoom-in */
  @media (max-width: 640px) {
    .field input, .field select, .field textarea {
      font-size: 16px !important;
    }
  }

  /* Tap-target floor on mobile (WCAG/Apple HIG ≈ 44px) */
  @media (hover: none) and (pointer: coarse) {
    .btn { min-height: 44px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel" src="booking.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
